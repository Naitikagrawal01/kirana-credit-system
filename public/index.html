<!DOCTYPE html>
<html>
<head>
  <title>Kirana Credit</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>🧾 Kirana Credit System</h1>

<div class="card">
  <h2>💼 Kirana Dashboard</h2>
  <p>Manage credits & repayments easily</p>
</div>

<h2>Total Outstanding: ₹<span id="total">0</span></h2>

<input id="search" placeholder="🔍 Search Customer..." oninput="load()">

<h2>Add Customer</h2>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="addr" placeholder="Address">
<button onclick="addCustomer()">Add</button>

<h2>Customers</h2>
<div id="list">Loading...</div>

<h2>Add Credit</h2>
<select id="cid"></select>
<input id="amt" placeholder="Amount">
<input id="item" placeholder="Items">
<button onclick="addCredit()">Add Credit</button>

<h2>Repayment</h2>
<select id="rid"></select>
<input id="ramt" placeholder="Amount">
<button onclick="repay()">Repay</button>

</div>

<script src="script.js"></script>
</body>
</html>
